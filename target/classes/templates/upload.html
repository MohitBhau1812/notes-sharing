<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Upload Note</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    label { display:block; margin-bottom:6px; font-weight:bold; }
    input, textarea { width:100%; padding:10px; margin-bottom:16px;
                      border:1px solid #d1d5db; border-radius:6px; box-sizing:border-box; }
    .btn { padding:10px 24px; background:#2563eb; color:white;
           border:none; border-radius:6px; cursor:pointer; font-size:16px; }
  </style>
</head>
<body>
  <h2>Upload a Note</h2>
  <a href="/">Back to Home</a>
  <form th:action="@{/upload}" th:object="${note}" method="post" style="margin-top:20px;">
    <label>Note Title</label>
    <input type="text" th:field="*{title}" placeholder="e.g. Data Structures Chapter 3" required/>
    <label>Subject</label>
    <input type="text" th:field="*{subject}" placeholder="e.g. Computer Science" required/>
    <label>Your Name</label>
    <input type="text" th:field="*{uploader}" placeholder="e.g. Mohit Bhau" required/>
    <label>Note Content</label>
    <textarea th:field="*{content}" rows="8" placeholder="Paste your notes here..."></textarea>
    <button type="submit" class="btn">Upload Note</button>
  </form>
</body>
</html>
