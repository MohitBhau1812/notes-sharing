<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Upload Note</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #0f172a; color: #f8fafc; }
    h2 { font-size: 2.2rem; margin-bottom: 20px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    a.back-link { color: #60a5fa; text-decoration: none; display: inline-flex; align-items: center; margin-bottom: 30px; transition: color 0.2s; font-weight: 500; }
    a.back-link:hover { color: #93c5fd; }
    .form-container { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); border: 1px solid #334155; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #cbd5e1; }
    input, textarea { width: 100%; padding: 12px 16px; margin-bottom: 24px; border: 1px solid #475569; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; outline: none; transition: border-color 0.2s, box-shadow 0.2s; font-family: 'Inter', sans-serif; }
    input:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    .btn { padding: 14px 24px; width: 100%; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.2s; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4); }
  </style>
</head>
<body>
  <h2>Upload a Note</h2>
  <a href="/" class="back-link">← Back to Home</a>
  
  <div class="form-container">
    <form th:action="@{/upload}" th:object="${note}" method="post">
      <label>Note Title</label>
      <input type="text" th:field="*{title}" placeholder="e.g. Data Structures Chapter 3" required/>
      <label>Subject</label>
      <input type="text" th:field="*{subject}" placeholder="e.g. Computer Science" required/>
      <label>Your Name</label>
      <input type="text" th:field="*{uploader}" placeholder="e.g. Mohit Bhau" required/>
      <label>Note Content</label>
      <textarea th:field="*{content}" rows="8" placeholder="Paste your notes here..."></textarea>
      <button type="submit" class="btn">Upload Note</button>
    </form>
  </div>
</body>
</html>
