
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Notes Sharing Website</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 20px; background: #0f172a; color: #f8fafc; }
    .header { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); text-align: center; }
    .header h1 { margin: 0 0 10px 0; font-size: 2.5rem; letter-spacing: -1px; }
    .header p { margin: 0; font-size: 1.1rem; opacity: 0.9; }
    .note-card { background: #1e293b; border: 1px solid #334155; padding: 24px; margin: 20px 0; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s; }
    .note-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -8px rgba(0,0,0,0.5); border-color: #475569; }
    .note-card h3 { margin-top: 0; color: #60a5fa; font-size: 1.5rem; margin-bottom: 15px; }
    .note-card p { color: #cbd5e1; line-height: 1.6; }
    .note-card strong { color: #f8fafc; }
    .btn { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; display:inline-block; font-weight: 500; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3); }
    .btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 6px 12px -2px rgba(59, 130, 246, 0.4); }
    .btn-red { background: #ef4444; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.3); }
    .btn-red:hover { background: #dc2626; box-shadow: 0 6px 12px -2px rgba(239, 68, 68, 0.4); }
    input[type=text] { padding: 12px 16px; border: 1px solid #475569; border-radius: 8px; width: 100%; max-width: 350px; background: #0f172a; color: white; outline: none; transition: border-color 0.2s, box-shadow 0.2s; font-family: 'Inter', sans-serif; }
    input[type=text]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    .actions-bar { margin: 30px 0; display: flex; gap: 16px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .search-form { display: flex; gap: 10px; flex: 1; justify-content: flex-end; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Online Notes Sharing Website</h1>
    <p>Share and access study notes — anytime, anywhere</p>
  </div>
  <div class="actions-bar">
    <a href="/upload" class="btn">+ Upload Note</a>
    <form action="/search" method="get" class="search-form">
      <input type="text" name="subject" placeholder="Search by subject..."/>
      <button type="submit" class="btn">Search</button>
    </form>
  </div>
  <div th:each="note : ${notes}" class="note-card">
    <h3 th:text="${note.title}"></h3>
    <p><strong>Subject:</strong> <span th:text="${note.subject}"></span></p>
    <p><strong>By:</strong> <span th:text="${note.uploader}"></span></p>
    <p th:text="${note.content}"></p>
    <a th:href="@{/delete/{id}(id=${note.id})}" class="btn btn-red">Delete</a>
  </div>
  <div th:if="${#lists.isEmpty(notes)}" style="text-align:center;margin-top:40px;color:#6b7280;">
    <p>No notes yet. Click "Upload Note" to add the first one!</p>
  </div>
</body>
</html>
