name: Build, Test, and Deploy Notes App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Maven Build & Test
    runs-on: ubuntu-latest # GitHub provides a fresh Ubuntu machine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean package -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/notes-sharing-1.0.0.jar

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/notes-sharing:latest
            ${{ secrets.DOCKER_USERNAME }}/notes-sharing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build-push 

    steps:
      - name: Deploy container
        run: |
          echo "======================================="
          echo "Deployment Steps (run on your server):"
          echo "======================================="
          echo "1. docker pull ${{ secrets.DOCKER_USERNAME }}/notes-sharing:latest"
          echo "2. docker stop notes-container || true"
          echo "3. docker rm notes-container || true"
          echo "4. docker run -d -p 8080:8080 --name notes-container \
                   ${{ secrets.DOCKER_USERNAME }}/notes-sharing:latest"
          echo "Website is live at http://your-server-ip:8080"
